  pre_computation_time_minutes: 0

ai_tools_used:
  - "Codex"

ai_usage_summary: |
  Used Codex for code review, debugging, and implementation guidance.
  The final ranking step is local and deterministic. No hosted LLM or API is
  called during candidate ranking.

methodology_summary: |
  Fast local hybrid ranker for the Senior AI Engineer JD. The score combines
  AI/ML title fit, career evidence of retrieval/ranking/recommendation/search,
  production ML and product engineering systems, relevant skill strength,
  experience fit, behavioral availability signals, location/relocation fit,
  and consistency penalties for likely honeypot or keyword-stuffed profiles.
  The system avoids per-candidate LLM calls and model downloads so the
  ranking step runs on CPU within the challenge limit.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
