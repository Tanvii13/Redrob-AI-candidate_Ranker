ai_usage_summary: |
  Used chatGPT for code review, and implementation guidance. Gemini for UI.
  The final ranking step is local and deterministic. No hosted LLM or API is
  called during candidate ranking.

methodology_summary: |
 Hybrid candidate ranking system designed specifically for the Redrob Senior AI Engineer role.
 The ranker evaluates candidates using a weighted combination of title relevance, career history, 
 AI/ML skills, retrieval and ranking system experience, production engineering evidence, experience
 fit, behavioral availability signals, and location preferences. Career descriptions are analyzed
 for evidence of search, recommendation, retrieval, ranking, embeddings, vector search, evaluation
 frameworks, and production ML systems, reflecting the core requirements of the job description.
 Behavioral signals such as open-to-work status, recruiter responsiveness, platform activity, notice
 period, and relocation willingness are incorporated to estimate hiring likelihood. The system also 
 performs profile consistency checks to identify likely keyword-stuffed or suspicious profiles, 
 including unsupported expert-level skills, experience inconsistencies, and strong AI skill claims 
 without corresponding technical career evidence. Final rankings are generated through a deterministic 
 CPU-only weighted scoring framework with no external API calls, enabling reproducible execution 
 within the competition compute constraints.

